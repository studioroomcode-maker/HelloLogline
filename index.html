<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Loglines</title>
    <!-- Google Fonts: loaded once here, not on every React render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Theme tokens ── */
      :root {
        /* ── Dark mode (default) ── */
        --tw: 255,255,255;
        --bg-page:    #0c0c1a;
        --bg-page-alt:#0a0a18;
        --bg-surface: #13131f;
        --bg-nav:     rgba(12,12,26,0.92);
        --text-main:  #e8e8f0;
        --scrollbar-thumb: rgba(255,255,255,0.1);
        /* 카드 배경 */
        --c-card-1: rgba(255,255,255,0.03);
        --c-card-2: rgba(255,255,255,0.04);
        --c-card-3: rgba(255,255,255,0.05);
        /* 테두리 */
        --c-bd-1: rgba(255,255,255,0.06);
        --c-bd-2: rgba(255,255,255,0.07);
        --c-bd-3: rgba(255,255,255,0.08);
        --c-bd-4: rgba(255,255,255,0.10);
        --c-bd-5: rgba(255,255,255,0.12);
        --c-bd-6: rgba(255,255,255,0.15);
        /* 텍스트 단계 (dark: rgba white) */
        --c-tx-20: rgba(255,255,255,0.20);
        --c-tx-25: rgba(255,255,255,0.25);
        --c-tx-28: rgba(255,255,255,0.28);
        --c-tx-30: rgba(255,255,255,0.30);
        --c-tx-35: rgba(255,255,255,0.35);
        --c-tx-40: rgba(255,255,255,0.40);
        --c-tx-45: rgba(255,255,255,0.45);
        --c-tx-50: rgba(255,255,255,0.50);
        --c-tx-55: rgba(255,255,255,0.55);
        --c-tx-60: rgba(255,255,255,0.60);
        --c-tx-65: rgba(255,255,255,0.65);
        --c-tx-70: rgba(255,255,255,0.70);
        --c-tx-75: rgba(255,255,255,0.75);
      }
      [data-theme="light"] {
        /* ── Light mode ── */
        --tw: 0,0,0;
        --bg-page:    #f0f1f6;
        --bg-page-alt:#e5e7f0;
        --bg-surface: #ffffff;
        --bg-nav:     rgba(240,241,246,0.95);
        --text-main:  #0d0d22;
        --scrollbar-thumb: rgba(0,0,0,0.2);
        /* 카드 배경: 흰색 카드 */
        --c-card-1: #ffffff;
        --c-card-2: #fafbfd;
        --c-card-3: rgba(0,0,0,0.05);
        /* 테두리: 다크 모드보다 2-2.5배 강화 */
        --c-bd-1: rgba(0,0,0,0.14);
        --c-bd-2: rgba(0,0,0,0.17);
        --c-bd-3: rgba(0,0,0,0.20);
        --c-bd-4: rgba(0,0,0,0.24);
        --c-bd-5: rgba(0,0,0,0.28);
        --c-bd-6: rgba(0,0,0,0.32);
        /* 텍스트: 라이트 모드에서 흑색은 동일 opacity로 훨씬 옅어 보여 ~1.7-2배 강화 */
        --c-tx-20: rgba(0,0,0,0.42);
        --c-tx-25: rgba(0,0,0,0.50);
        --c-tx-28: rgba(0,0,0,0.54);
        --c-tx-30: rgba(0,0,0,0.56);
        --c-tx-35: rgba(0,0,0,0.62);
        --c-tx-40: rgba(0,0,0,0.68);
        --c-tx-45: rgba(0,0,0,0.73);
        --c-tx-50: rgba(0,0,0,0.76);
        --c-tx-55: rgba(0,0,0,0.79);
        --c-tx-60: rgba(0,0,0,0.82);
        --c-tx-65: rgba(0,0,0,0.84);
        --c-tx-70: rgba(0,0,0,0.86);
        --c-tx-75: rgba(0,0,0,0.88);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: var(--bg-page); transition: background 0.25s; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:translateY(0);} }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }
      textarea { outline: none; }
      textarea:focus { border-color: rgba(200,168,75,0.4) !important; }
      input { outline: none; }
      button { font-family: 'Noto Sans KR', sans-serif; }
    </style>
    <!-- Anti-flash: apply saved theme before React renders -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
