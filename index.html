<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Loglines</title>
    <!-- Google Fonts: loaded once here, not on every React render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Theme tokens ── */
      :root {
        /* ── Dark mode (default) ── */
        --tw: 255,255,255;
        --bg-page:    #0c0c1a;
        --bg-page-alt:#0a0a18;
        --bg-surface: #13131f;
        --bg-nav:     rgba(12,12,26,0.9);
        --text-main:  #e8e8f0;
        --scrollbar-thumb: rgba(255,255,255,0.1);
        /* 카드 배경 */
        --c-card-1: rgba(255,255,255,0.03);
        --c-card-2: rgba(255,255,255,0.04);
        --c-card-3: rgba(255,255,255,0.05);
        /* 테두리 */
        --c-bd-1: rgba(255,255,255,0.06);
        --c-bd-2: rgba(255,255,255,0.07);
        --c-bd-3: rgba(255,255,255,0.08);
        --c-bd-4: rgba(255,255,255,0.10);
        --c-bd-5: rgba(255,255,255,0.12);
        --c-bd-6: rgba(255,255,255,0.15);
      }
      [data-theme="light"] {
        /* ── Light mode ── */
        --tw: 0,0,0;
        --bg-page:    #eaecf4;
        --bg-page-alt:#dde0ec;
        --bg-surface: #ffffff;
        --bg-nav:     rgba(234,236,244,0.94);
        --text-main:  #0e0e24;
        --scrollbar-thumb: rgba(0,0,0,0.18);
        /* 카드 배경: 흰색 카드로 페이지와 분리 */
        --c-card-1: #ffffff;
        --c-card-2: #f9fafd;
        --c-card-3: rgba(0,0,0,0.06);
        /* 테두리: 2-3배 강화해 라이트 모드에서 선명하게 */
        --c-bd-1: rgba(0,0,0,0.13);
        --c-bd-2: rgba(0,0,0,0.16);
        --c-bd-3: rgba(0,0,0,0.19);
        --c-bd-4: rgba(0,0,0,0.22);
        --c-bd-5: rgba(0,0,0,0.26);
        --c-bd-6: rgba(0,0,0,0.30);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: var(--bg-page); transition: background 0.25s; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:translateY(0);} }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }
      textarea { outline: none; }
      textarea:focus { border-color: rgba(200,168,75,0.4) !important; }
      input { outline: none; }
      button { font-family: 'Noto Sans KR', sans-serif; }
    </style>
    <!-- Anti-flash: apply saved theme before React renders -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
