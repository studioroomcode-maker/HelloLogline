<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Loglines</title>
    <!-- Google Fonts: loaded once here, not on every React render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Theme tokens ── */
      :root {
        /* ── Dark mode (default) ── */
        --tw: 255,255,255;
        --bg-page:    #0c0c1c;
        --bg-page-alt:#08080f;
        --bg-surface: #111120;
        --bg-nav:     rgba(10,10,22,0.95);
        --text-main:  #eeeef8;
        --bg-tooltip: rgba(8,8,20,0.98);
        --text-tooltip: rgba(255,255,255,0.90);
        --scrollbar-thumb: rgba(255,255,255,0.18);
        /* 카드 배경 — 기존 3-5% → 7-13%로 강화 */
        --c-card-1: rgba(255,255,255,0.07);
        --c-card-2: rgba(255,255,255,0.10);
        --c-card-3: rgba(255,255,255,0.13);
        /* 테두리 — 기존 6-15% → 15-38%로 강화 */
        --c-bd-1: rgba(255,255,255,0.15);
        --c-bd-2: rgba(255,255,255,0.19);
        --c-bd-3: rgba(255,255,255,0.23);
        --c-bd-4: rgba(255,255,255,0.28);
        --c-bd-5: rgba(255,255,255,0.33);
        --c-bd-6: rgba(255,255,255,0.38);
        /* 텍스트 단계 — 기존보다 약 +8-10% 밝게 */
        --c-tx-20: rgba(255,255,255,0.30);
        --c-tx-25: rgba(255,255,255,0.36);
        --c-tx-28: rgba(255,255,255,0.40);
        --c-tx-30: rgba(255,255,255,0.44);
        --c-tx-35: rgba(255,255,255,0.50);
        --c-tx-40: rgba(255,255,255,0.57);
        --c-tx-45: rgba(255,255,255,0.63);
        --c-tx-50: rgba(255,255,255,0.69);
        --c-tx-55: rgba(255,255,255,0.75);
        --c-tx-60: rgba(255,255,255,0.80);
        --c-tx-65: rgba(255,255,255,0.85);
        --c-tx-70: rgba(255,255,255,0.89);
        --c-tx-75: rgba(255,255,255,0.93);
      }
      [data-theme="light"] {
        /* ── Light mode — 회색 페이지 + 흰 카드 구조로 전환 ── */
        --tw: 0,0,0;
        --bg-page:    #edf0f7;
        --bg-page-alt:#e2e6f0;
        --bg-surface: #ffffff;
        --bg-nav:     rgba(237,240,247,0.97);
        --text-main:  #090920;
        --bg-tooltip: rgba(20,22,44,0.97);
        --text-tooltip: rgba(255,255,255,0.90);
        --scrollbar-thumb: rgba(0,0,0,0.22);
        /* 카드 배경: 흰 카드가 회색 페이지 위에서 명확히 부각 */
        --c-card-1: #ffffff;
        --c-card-2: #f7f9ff;
        --c-card-3: rgba(0,0,0,0.06);
        /* 테두리 — 기존 14-32% → 22-50%로 강화 */
        --c-bd-1: rgba(0,0,0,0.22);
        --c-bd-2: rgba(0,0,0,0.27);
        --c-bd-3: rgba(0,0,0,0.32);
        --c-bd-4: rgba(0,0,0,0.38);
        --c-bd-5: rgba(0,0,0,0.44);
        --c-bd-6: rgba(0,0,0,0.50);
        /* 텍스트 — 대비 강화 */
        --c-tx-20: rgba(0,0,0,0.44);
        --c-tx-25: rgba(0,0,0,0.52);
        --c-tx-28: rgba(0,0,0,0.57);
        --c-tx-30: rgba(0,0,0,0.61);
        --c-tx-35: rgba(0,0,0,0.67);
        --c-tx-40: rgba(0,0,0,0.73);
        --c-tx-45: rgba(0,0,0,0.78);
        --c-tx-50: rgba(0,0,0,0.82);
        --c-tx-55: rgba(0,0,0,0.85);
        --c-tx-60: rgba(0,0,0,0.88);
        --c-tx-65: rgba(0,0,0,0.90);
        --c-tx-70: rgba(0,0,0,0.92);
        --c-tx-75: rgba(0,0,0,0.94);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: var(--bg-page); transition: background 0.25s; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:translateY(0);} }
      @keyframes fadeSlideUp { from { opacity:0; transform:translateY(12px);} to { opacity:1; transform:translateY(0);} }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }
      textarea { outline: none; }
      textarea:focus { border-color: rgba(200,168,75,0.4) !important; }
      input { outline: none; }
      button { font-family: 'Noto Sans KR', sans-serif; }
    </style>
    <!-- Anti-flash: apply saved theme before React renders -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://js.tosspayments.com/v1/payment"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
